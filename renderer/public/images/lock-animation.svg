<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <style>
      .shackle-group {
        animation: liftup 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
      }
      @keyframes liftup {
        0%   { transform: translateY(0px); }
        100% { transform: translateY(-22px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="220" fill="#ffffff"/>

  <!-- Shackle (moves up) -->
  <g class="shackle-group">
    <path
      fill="none"
      stroke="oklch(19.616% 0.063 257.651)"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M 72 143
         L 72 98
         Q 72 78 100 78
         Q 128 78 128 98
         L 128 118"
    />
  </g>

  <!-- Lock body -->
  <rect fill="oklch(19.616% 0.063 257.651)" x="53" y="113" width="94" height="72" rx="6"/>

  <!-- Slot covers -->
  <rect fill="oklch(19.616% 0.063 257.651)" x="65" y="114" width="14" height="71"/>
  <rect fill="oklch(19.616% 0.063 257.651)" x="121" y="114" width="14" height="71"/>

  <!-- Keyhole -->
  <circle fill="#ffffff" cx="100" cy="141" r="7"/>
  <rect fill="#ffffff" x="97" y="141" width="6" height="12" rx="2"/>
</svg>
